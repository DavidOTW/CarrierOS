services:
  - type: web
    name: carrieros-otw
    runtime: docker
    plan: starter
    region: ohio
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: CARRIEROS_ENV
        value: production
      - key: CARRIEROS_SECRET
        generateValue: true
      - key: CARRIEROS_DB
        value: /data/carrieros.db
      - key: CARRIEROS_BACKUP_DIR
        value: /data/backups
      - key: CARRIEROS_BACKUP_RETENTION
        value: "14"
      - key: CARRIEROS_BACKUP_INTERVAL_HOURS
        value: "24"
      - key: CARRIEROS_BILLING_MODE
        value: stripe
      - key: CARRIEROS_PUBLIC_URL
        value: https://otwcarrieros.com
      - key: CARRIEROS_SUPPORT_EMAIL
        value: david@outsidethewirelogistics.com
      - key: CARRIEROS_ROUTE_PROVIDER
        value: manual
      - key: CARRIEROS_PRIVATE_STORAGE_ROOT
        value: /data/private-documents
      - key: CARRIEROS_STORAGE_ENCRYPTED_AT_REST
        value: "true"
      - key: CARRIEROS_MALWARE_SCANNER
        value: clamav
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_OWNER_OPERATOR
        sync: false
      - key: STRIPE_PRICE_CARRIER_STARTUP
        sync: false
      - key: STRIPE_PRICE_STARTER_FLEET
        sync: false
      - key: STRIPE_PRICE_SMALL_FLEET
        sync: false
      - key: STRIPE_PRICE_GROWING_FLEET
        sync: false
      - key: STRIPE_PORTAL_CONFIGURATION_ID
        sync: false
      - key: STRIPE_TAX_ENABLED
        value: "false"
      - key: CARRIEROS_SMTP_HOST
        sync: false
      - key: CARRIEROS_SMTP_PORT
        value: "587"
      - key: CARRIEROS_SMTP_SECURITY
        value: starttls
      - key: CARRIEROS_SMTP_USERNAME
        sync: false
      - key: CARRIEROS_SMTP_PASSWORD
        sync: false
      - key: CARRIEROS_SMTP_FROM
        value: "CarrierOS Support <david@outsidethewirelogistics.com>"
    disk:
      name: carrieros-data
      mountPath: /data
      sizeGB: 1
